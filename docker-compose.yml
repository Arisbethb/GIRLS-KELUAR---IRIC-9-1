version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: eqx_db
    restart: always
    environment:
      MYSQL_DATABASE: infraestructura_db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: eqx_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root_password
      - DB_NAME=infraestructura_db
      - PORT=5000
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: eqx_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
