<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Infraestructura (Unidad 1)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div id="login-section" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <h2 class="text-center mb-4">Gestor de Infraestructura (Unidad 1)</h2>
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="card-title mb-3">Iniciar Sesión</h3>
                        <form id="login-form">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="login-email" class="form-control" value="admin@admin.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="login-password" class="form-control" value="123456" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                        </form>
                        <div id="login-error" class="alert alert-danger mt-3 d-none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="crud-section" class="container-fluid mt-4 d-none">
        <div class="row px-4">
            <div class="col-12 d-flex justify-content-between align-content-center mb-4">
                <h2>Panel de Control: Usuarios de Infraestructura</h2>
                <button class="btn btn-secondary" onclick="logout()">Cerrar Sesión</button>
            </div>
            
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 id="form-title" class="card-title mb-3">Registrar Usuario</h4>
                        <form id="user-form">
                            <input type="hidden" id="user-id">
                            <div class="mb-3">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" id="user-name" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" id="user-email" class="form-control" required>
                            </div>
                            <div class="mb-3" id="password-group">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="user-password" class="form-control">
                            </div>
                            <button type="submit" class="btn btn-success w-100">Guardar Usuario</button>
                            <button type="button" id="btn-cancel" class="btn btn-light w-100 mt-2 d-none" onclick="resetForm()">Cancelar Edición</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h4 class="card-title mb-3">Listado de Usuarios Activos</h4>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nombre</th>
                                        <th>Email</th>
                                        <th class="text-center">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="users-table-body">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN CLAVE: Apunta directo a la IP de la Máquina Virtual
        const API_URL = 'http://192.168.100.17:5000/api';

        // Manejador del Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    errorDiv.classList.add('d-none');
                    document.getElementById('login-section').classList.add('d-none');
                    document.getElementById('crud-section').classList.remove('d-none');
                    loadUsers(); // Cargar la tabla
                } else {
                    errorDiv.textContent = data.message || 'Error al iniciar sesión';
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                errorDiv.textContent = 'No se pudo conectar con el Backend';
                errorDiv.classList.remove('d-none');
                console.error(err);
            }
        });

        // Cargar Usuarios
        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/users`);
                const users = await response.json();
                const tbody = document.getElementById('users-table-body');
                tbody.innerHTML = '';

                users.forEach(user => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${user.id}</td>
                            <td>${user.name}</td>
                            <td>${user.email}</td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-warning me-2" onclick="editUser(${user.id}, '${user.name}', '${user.email}')">Editar</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id})">Eliminar (Lógico)</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error('Error al cargar usuarios:', err);
            }
        }

        // Guardar o Actualizar Usuario
        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('user-id').value;
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            const password = document.getElementById('user-password').value;

            const url = id ? `${API_URL}/users/${id}` : `${API_URL}/users`;
            const method = id ? 'PUT' : 'POST';
            
            const bodyData = { name, email };
            if (password) bodyData.password = password;

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });

                if (response.ok) {
                    alert(id ? 'Usuario actualizado con éxito' : 'Usuario registrado con éxito');
                    resetForm();
                    loadUsers();
                } else {
                    const errData = await response.json();
                    alert('Error: ' + errData.message);
                }
            } catch (err) {
                console.error(err);
            }
        });

        // Preparar Edición
        function editUser(id, name, email) {
            document.getElementById('user-id').value = id;
            document.getElementById('user-name').value = name;
            document.getElementById('user-email').value = email;
            document.getElementById('form-title').textContent = 'Editar Usuario #' + id;
            document.getElementById('password-group').classList.add('d-none'); // Ocultar pass en edición
            document.getElementById('btn-cancel').classList.remove('d-none');
        }

        // Borrado Lógico
        async function deleteUser(id) {
            if (confirm('¿Estás seguro de aplicar un borrado lógico a este usuario?')) {
                try {
                    const response = await fetch(`${API_URL}/users/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        alert('Borrado lógico aplicado correctamente.');
                        loadUsers();
                    }
                } catch (err) {
                    console.error(err);
                }
            }
        }

        // Limpiar Formulario
        function resetForm() {
            document.getElementById('user-id').value = '';
            document.getElementById('user-form').reset();
            document.getElementById('form-title').textContent = 'Registrar Usuario';
            document.getElementById('password-group').classList.remove('d-none');
            document.getElementById('btn-cancel').classList.add('d-none');
        }

        // Logout
        function logout() {
            document.getElementById('crud-section').classList.add('d-none');
            document.getElementById('login-section').classList.remove('d-none');
            document.getElementById('login-form').reset();
        }
    </script>
</body>
</html>
